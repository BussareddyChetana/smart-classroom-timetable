{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Subjects</h1>
    <a class="btn btn-primary" href="{{ url_for('add_subject') }}">
        Add Subject
    </a>
</div>

<div class="table-responsive">
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Subject Name</th>
                <th>Faculty</th>
                <th>Department</th>
                <th>Section</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for subject in subjects %}
            <tr>
                <td>{{ subject.subject_name }}</td>
                <td>{{ subject.faculty_name }}</td>
                <td>{{ subject.department }}</td>
                <td>{{ subject.section_name }}</td>

                <td>
                    <a class="btn btn-sm btn-warning"
                       href="{{ url_for('edit_subject', subject_id=subject.subject_id) }}">
                        Edit
                    </a>

                    <a class="btn btn-sm btn-danger"
                       href="{{ url_for('delete_subject', subject_id=subject.subject_id) }}"
                       onclick="return confirm('Are you sure you want to delete this subject?')">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>
</div>

{% endblock %}
