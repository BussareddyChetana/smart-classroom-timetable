{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Students</h1>
    <a class="btn btn-primary" href="{{ url_for('add_student') }}">Add Student</a>
</div>
<div class="table-responsive">
<table class="table table-hover">
    <thead>
        <tr>
            <th>Roll Number</th>
            <th>Section</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for student in students %}
            <tr>
                <td>{{ student.roll_number }}</td>
                <td>{{ student.section_name }}</td>
                <td>
                    <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('edit_student', roll_number=student.roll_number) }}">Edit</a>
                    <a class="btn btn-sm btn-outline-danger" href="{{ url_for('delete_student', roll_number=student.roll_number) }}">Delete</a>
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>
</div>
{% endblock %}
