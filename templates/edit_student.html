{% extends 'base.html' %}
{% block content %}
<h1 class="mb-4">Edit Student</h1>
<form method="post">
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Roll Number</label>
            <input class="form-control" value="{{ student.roll_number }}" disabled>
        </div>
        <div class="col-md-6">
            <label class="form-label">New Password</label>
            <input type="password" name="password" class="form-control">
        </div>
        <div class="col-md-6">
            <label class="form-label">Section</label>
            <select name="section_id" class="form-select">
                {% for section in sections %}
                    <option value="{{ section.section_id }}" {% if section.section_id == student.section_id %}selected{% endif %}>{{ section.section_name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <button class="btn btn-primary mt-4">Update Student</button>
</form>
{% endblock %}
